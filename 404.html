<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Departed Digital</title>
  <meta name="description" content="The page you requested could not be found." />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#1a2744" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1a2744;
      --navy-dark: #111b35;
      --gold: #c9a84c;
      --gold-light: #e0c06a;
      --white: #ffffff;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, var(--navy-dark) 0%, var(--navy) 100%);
      color: var(--white);
      text-align: center;
      font-family: 'Inter', sans-serif;
    }
    .wrap {
      max-width: 640px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      margin-bottom: 16px;
    }
    p {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 28px;
      line-height: 1.7;
    }
    a {
      display: inline-block;
      background: var(--gold);
      color: var(--navy-dark);
      text-decoration: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-weight: 700;
    }
    a:hover { background: var(--gold-light); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <p>The page you were looking for is not here. You can head back to the homepage or browse the latest guides.</p>
    <p>
      <a href="/">Back to home</a>
    </p>
  </div>
</body>
